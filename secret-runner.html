      <a class="social-icon bili" href="https://space.bilibili.com/37845546" target="_blank" rel="noreferrer" aria-label="Bilibili profile"><img src="assets/icons/BILIBILI_LOGO.png" alt="" decoding="async"></a>
      <a class="social-icon artstation" href="https://www.artstation.com/shuyuanji" target="_blank" rel="noreferrer" aria-label="ArtStation profile"><img src="assets/icons/artstation.png" alt="" decoding="async"></a>

        <canvas id="runner-canvas" width="960" height="360" aria-label="Hidden infinite runner game"></canvas>
        <button class="runner-start" type="button" data-runner-start>Click / Tap to Jump</button>
        <span class="runner-touch-hint">Tap anywhere to jump</span>
